<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat WhatsApp</title>
    <link rel="stylesheet" href="/styles.css?v=20260317-7" />
  </head>
  <body class="chat-page">
    <div class="shell">
            <!-- App Rail (Modern Left Navigation) -->
      <nav class="app-rail">
        <div class="rail-top">
          <!-- Chats -->
          <button class="rail-icon active" title="Conversas" aria-label="Conversas">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.93.55 3.73 1.5 5.25L2 22l4.9-1.3c1.5.83 3.23 1.3 5.1 1.3 5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.63 0-3.17-.42-4.52-1.16l-3.2.85.86-3.13C4.42 15.28 4 13.7 4 12c0-4.41 3.59-8 8-8s8 3.59 8 8-3.59 8-8 8z"/></svg>
          </button>
          <!-- Status -->
          <button class="rail-icon" title="Status" aria-label="Status">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 1.5 8.5 1.5zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>
        </div>
        <div class="rail-bottom">
           <!-- Theme Toggle -->
          <button id="themeToggle" class="rail-icon" title="Alternar Tema" aria-label="Alternar Tema">
            <svg viewBox="0 0 24 24"><path d="M12 21A9 9 0 1 1 12 3v18z" fill="currentColor"/></svg>
          </button>
          <!-- Profile (Links to Settings/Sessions) -->
          <a class="rail-icon profile" href="/sessoes" title="Configurações e Sessões" aria-label="Configurações e Sessões">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </a>
        </div>
      </nav>

      <aside class="sidebar">
        <div class="panel-head">
          <div>
            <h2>Conversas</h2>
          </div>
          <div class="topbar-actions">
            <label class="session-picker">
              <select id="sessionSelect" style="display: none;"></select>
            </label>
            <span id="sessionStatus" class="status-pill status-idle" style="display:none;">inativa</span>
            <a class="action-link" href="/sessoes" title="Gerenciar sessoes" aria-label="Gerenciar sessoes">⚙️</a>
            <button id="refreshConversationsButton" class="action-button secondary" type="button" title="Atualizar" aria-label="Atualizar">
              ↻
            </button>
          </div>
        </div>

        <div class="search-container">
          <input
            id="conversationSearchInput"
            type="search"
            placeholder="Buscar ou começar uma nova conversa"
            aria-label="Buscar ou começar uma nova conversa"
            autocomplete="off"
          />
        </div>

        <div id="conversationList" class="conversation-list">
          <p class="empty">Selecione uma sessao para carregar as conversas.</p>
        </div>
      </aside>

      <section class="chat-panel">
        <div class="chat-header">
          <div>
            <h2 id="conversationTitle">Selecione uma conversa</h2>
            <p id="conversationMeta" class="muted">Escolha uma conversa na lateral para abrir o historico.</p>
          </div>
          <p id="chatNotice" class="notice"></p>
        </div>

          <div id="messageList" class="message-list">
            <p class="empty">Nenhuma conversa carregada.</p>
          </div>

          <form id="composerForm" class="composer">
            <textarea
              id="composerInput"
              rows="3"
              placeholder="Digite uma mensagem ou use como legenda do arquivo"
              aria-label="Digite uma mensagem ou use como legenda do arquivo"
            ></textarea>

            <div class="composer-toolbar">
              <label class="action-button secondary file-button" for="composerFileInput">
                Anexar
              </label>
              <input id="composerFileInput" type="file" hidden />

              <select id="composerMediaKind" style="display: none;">
                <option value="auto">Arquivo: auto</option>
                <option value="image">Imagem</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
                <option value="document">Documento</option>
                <option value="sticker">Sticker</option>
              </select>

              <div id="composerFileChip" class="file-chip" hidden>
                <span id="composerFileName">Nenhum arquivo</span>
                <button id="composerClearFileButton" type="button" class="chip-clear">remover</button>
              </div>

              <button id="sendButton" class="action-button" type="submit">Enviar</button>
            </div>
          </form>
        </section>
    </div>

    <script type="module" src="/app.js?v=20260317-8"></script>
  </body>
</html>
