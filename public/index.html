<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat WhatsApp</title>
    <link rel="stylesheet" href="/styles.css?v=20260317-7" />
  </head>
  <body class="chat-page">
    <div class="shell">
      <aside class="sidebar">
        <div class="panel-head">
          <div>
            <h2>Conversas</h2>
          </div>
          <div class="topbar-actions">
            <label class="session-picker">
              <select id="sessionSelect"></select>
            </label>
            <span id="sessionStatus" class="status-pill status-idle" style="display:none;">inativa</span>
            <a class="action-link" href="/sessoes" title="Gerenciar sessoes">⚙️</a>
            <button id="refreshConversationsButton" class="action-button secondary" type="button" title="Atualizar">
              ↻
            </button>
          </div>
        </div>

        <div class="search-container">
          <input
            id="conversationSearchInput"
            type="search"
            placeholder="Buscar ou começar uma nova conversa"
            autocomplete="off"
          />
        </div>

        <div id="conversationList" class="conversation-list">
          <p class="empty">Selecione uma sessao para carregar as conversas.</p>
        </div>
      </aside>

      <section class="chat-panel">
        <div class="chat-header">
          <div>
            <h2 id="conversationTitle">Selecione uma conversa</h2>
            <p id="conversationMeta" class="muted">Escolha uma conversa na lateral para abrir o historico.</p>
          </div>
          <p id="chatNotice" class="notice"></p>
        </div>

          <div id="messageList" class="message-list">
            <p class="empty">Nenhuma conversa carregada.</p>
          </div>

          <form id="composerForm" class="composer">
            <textarea
              id="composerInput"
              rows="3"
              placeholder="Digite uma mensagem ou use como legenda do arquivo"
            ></textarea>

            <div class="composer-toolbar">
              <label class="action-button secondary file-button" for="composerFileInput">
                Anexar
              </label>
              <input id="composerFileInput" type="file" hidden />

              <select id="composerMediaKind">
                <option value="auto">Arquivo: auto</option>
                <option value="image">Imagem</option>
                <option value="video">Video</option>
                <option value="audio">Audio</option>
                <option value="document">Documento</option>
                <option value="sticker">Sticker</option>
              </select>

              <div id="composerFileChip" class="file-chip" hidden>
                <span id="composerFileName">Nenhum arquivo</span>
                <button id="composerClearFileButton" type="button" class="chip-clear">remover</button>
              </div>

              <button id="sendButton" class="action-button" type="submit">Enviar</button>
            </div>
          </form>
        </section>
    </div>

    <script type="module" src="/app.js?v=20260317-8"></script>
  </body>
</html>
